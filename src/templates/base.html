<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %} - RingMC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="{{ url_for('static', filename='script/main.js') }}"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="{{ url_for('index.home') }}">RingMC</a>
        </div>
        <ul class="navbar-menu">
            <li><a href="{{ url_for('index.home') }}">Accueil</a></li>
            <li><a href="{{ url_for('articles.articles_index') }}">Articles</a></li>
            <li><a href="{{ url_for('builds.builds_index') }}">Builds</a></li>
            {% if logged_in %}
            <li><a href="{{ url_for('index.logout') }}">Déconnexion</a></li>
            {% endif %}
        </ul>
    </nav>
    <main>
        {% block content %} {% endblock %}
    </main>
    <footer class="footer">
        <p>Fait avec amour par Owen, Adam et Kayle. Projet <a href="https://github.com/TheDogHusky/RingMC" target="_blank">Open Source</a></p>
    </footer>

    <div class="modals">
        {% include 'components/article_form.html' %}
        {% include 'components/build_form.html' %}
    </div>
</body>
</html>
